<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteio de Dados - BotHolly</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: #2a2a2a;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .dados-area {
            display: flex;
            gap: 20px;
            margin: 30px 0;
        }

        .dado {
            width: 80px;
            height: 80px;
            background: white;
            color: #333;
            font-size: 40px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2), 0 5px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        /* Animação de girar */
        .girando {
            animation: tremer 0.1s infinite;
        }

        @keyframes tremer {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            50% { transform: translate(-1px, -2px) rotate(-5deg); }
            100% { transform: translate(1px, 2px) rotate(5deg); }
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            background-color: #ffd700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #ffc400;
            transform: scale(1.05);
        }

        button:disabled {
            background-color: #666;
            cursor: not-allowed;
        }

        #resultado {
            margin-top: 20px;
            font-size: 20px;
            height: 30px;
        }

        .ganhou { color: #2ecc71; font-weight: bold; }
        .perdeu { color: #e74c3c; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Tire três 6 e ganhe!</h1>
        <p>Boa sorte no seu próximo pedido</p>

        <div class="dados-area">
            <div id="dado1" class="dado">?</div>
            <div id="dado2" class="dado">?</div>
            <div id="dado3" class="dado">?</div>
        </div>

        <button id="btn-rolar" onclick="jogarDados()">ROLAR DADOS</button>

        <div id="resultado"></div>
    </div>

    <script>
        function jogarDados() {
            const btn = document.getElementById('btn-rolar');
            const dados = [
                document.getElementById('dado1'),
                document.getElementById('dado2'),
                document.getElementById('dado3')
            ];
            const resultadoDiv = document.getElementById('resultado');

            // Desabilita botão e limpa resultado
            btn.disabled = true;
            resultadoDiv.innerHTML = "";
            
            // Inicia animação visual
            dados.forEach(dado => dado.classList.add('girando'));

            // Simulamos o tempo dos dados rolando (1.5 segundos)
            setTimeout(() => {
                let valores = [];

                dados.forEach((dado, index) => {
                    dado.classList.remove('girando');
                    // Gera número de 1 a 6
                    const valor = Math.floor(Math.random() * 6) + 1;
                    valores.push(valor);
                    dado.textContent = valor;
                });

                // Verifica se ganhou (Todos são 6)
                const ganhou = valores.every(v => v === 6);

                if (ganhou) {
                    resultadoDiv.innerHTML = "<span class='ganhou'>PARABÉNS! Você ganhou 20% de desconto! 🎁</span>";
                    // Aqui você poderia chamar sua função de aplicar cupom
                } else {
                    resultadoDiv.innerHTML = "<span class='perdeu'>Não foi dessa vez! Tente novamente.</span>";
                }

                btn.disabled = false;
            }, 1500);
        }
    </script>
</body>
</html>
