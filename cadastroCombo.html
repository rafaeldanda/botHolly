<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Combos</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --bg: #f1f5f9;
            --card: #ffffff;
            --border: #cbd5e1;
            --text: #1e293b;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); padding: 20px; color: var(--text); line-height: 1.5; }
        .container { max-width: 900px; margin: 0 auto; background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        h1, h2 { margin-bottom: 20px; font-size: 1.5rem; border-left: 4px solid var(--primary); padding-left: 10px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-weight: 600; font-size: 14px; color: #475569; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; }
        input:focus { border-color: var(--primary); }
        .options-group { display: flex; gap: 20px; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; }
        .checkbox-label { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 14px; padding: 8px; background: #fff; border-radius: 6px; border: 1px solid transparent; transition: 0.2s; }
        .checkbox-label:hover { border-color: var(--primary); background: #eff6ff; }
        .checkbox-label input { width: 18px; height: 18px; cursor: pointer; }
        .section-header { margin-top: 25px; padding: 10px; background: #e2e8f0; border-radius: 6px; font-weight: bold; font-size: 14px; }
        .adicionais-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; padding: 15px; border: 2px dashed #cbd5e1; border-radius: 8px; margin-bottom: 20px; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; padding: 10px; color: white; }
        .btn-main { width: 100%; padding: 16px; background: var(--success); font-size: 16px; margin-top: 10px; }
        .btn-edit { background: var(--primary); font-size: 12px; margin-right: 5px; }
        .btn-delete { background: var(--danger); font-size: 12px; }
        .table-container { width: 100%; overflow-x: auto; margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; color: #64748b; font-size: 12px; text-transform: uppercase; }
        #msgStatus { padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Configurar Combo</h1>
    <div id="msgStatus"></div>

    <form id="comboForm">
        <input type="hidden" id="actionField" value="create">
        <input type="hidden" id="comboIdField">
        
        <div class="form-grid">
            <div class="form-group">
                <label>Nome do Combo</label>
                <input type="text" id="nome" placeholder="Ex: Combo Super Burger" required>
            </div>
            <div class="form-group">
                <label>Preço de Venda (R$)</label>
                <input type="number" id="preco" step="0.01" placeholder="Ex: 45.00" required>
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label>Descrição do Combo</label>
            <textarea id="descricao" rows="3" placeholder="Ex: 1 Burger, 1 Batata M e 1 Refrigerante" required></textarea>
        </div>

        <div class="options-group">
            <label class="checkbox-label"><input type="checkbox" id="ativo" checked> Disponível para venda</label>
        </div>

        <div class="section-header">Selecione os Itens/Adicionais Inclusos</div>
        <div id="adicionaisContainer" class="adicionais-grid"></div>
		<div class="section-header">Selecione a Imagem Desejada</br>
			<input type="file" id="fotoInput" accept="image/jpeg, image/png, image/webp, image/avif">
		</div>

        <button type="submit" class="btn-main" id="btnSubmit">SALVAR COMBO</button>
        <button type="button" class="btn-main" id="btnCancel" style="display:none; background: #64748b; margin-top: 5px;" onclick="resetForm()">CANCELAR EDIÇÃO</button>
    </form>

    <div class="table-container">
        <h2>Meus Combos</h2>
        <table>
            <thead>
                <tr>
                    <th>Nome / Descrição</th>
                    <th>Preço</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaCombos"></tbody>
        </table>
    </div>
</div>

<script>



	
	


    const WEBHOOK_ADDS = 'https://primary-production-fad5.up.railway.app/webhook/b392fae3-1dff-4817-9bae-7b8cb9c52929';
    const WEBHOOK_COMBOS = 'https://primary-production-fad5.up.railway.app/webhook/6f070c83-fc80-43f4-898c-549dc109346d';

    const urlParams = new URLSearchParams(window.location.search);
    const idLoja = urlParams.get('l');
    let dbAdicionais = [];

    window.onload = () => { 
        if(!idLoja) return alert("ID da Loja não identificado.");
        carregarAdicionais();
        carregarCombos();
    };

    async function carregarAdicionais() {
        try {
            const res = await fetch(WEBHOOK_ADDS, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action: "read", lojaId: idLoja })
            });
            dbAdicionais = await res.json();
            const container = document.getElementById('adicionaisContainer');
            container.innerHTML = dbAdicionais.map(a => `
                <label class="checkbox-label">
                    <input type="checkbox" name="chkAdd" value="${a.adicionalId}">
                    <span>${a.nome} (R$ ${parseFloat(a.preco).toFixed(2)})</span>
                </label>
            `).join('');
        } catch (e) { console.error("Erro ao carregar adicionais."); }
    }

    async function carregarCombos() {
        const tbody = document.getElementById('listaCombos');
        try {
            const res = await fetch(WEBHOOK_COMBOS, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action: "read", lojaId: idLoja })
            });
            const combos = await res.json();
            tbody.innerHTML = combos.map(c => `
                <tr>
                    <td><strong>${c.nome}</strong><br><small style="color:gray">${c.descricao}</small></td>
                    <td>R$ ${c.preco ? parseFloat(c.preco).toFixed(2) : '0.00'}</td>
                    <td>${c.ativo ? '✅ Ativo' : '❌ Inativo'}</td>
                    <td>
                        <button onclick='prepararEdicao(${JSON.stringify(c)})' class="btn-edit">Editar</button>
                        <button onclick="deletarCombo('${c.comboId}')" class="btn-delete">Excluir</button>
                    </td>
                </tr>
            `).join('');
        } catch (e) { tbody.innerHTML = "<tr><td colspan='4'>Nenhum combo cadastrado.</td></tr>"; }
    }

   document.getElementById('comboForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const action = document.getElementById('actionField').value;
    const fotoInput = document.getElementById('fotoInput'); // Pegando a referência correta do input
    
    const selecionados = Array.from(document.querySelectorAll('input[name="chkAdd"]:checked'))
        .map(cb => {
            const item = dbAdicionais.find(i => i.adicionalId === cb.value);
            return { 
                nome: item.nome, 
                preco: item.preco, 
                descricao: item.descricao, 
                adicionalId: item.adicionalId 
            };
        });

    const formData = new FormData();

    // 1. Adiciona a imagem (se houver)
    if (fotoInput.files.length > 0) {
        formData.append('data', fotoInput.files[0]); 
    }

    // 2. CORREÇÃO DA SINTAXE: Usar vírgula e parênteses
    formData.append('action', action);
    formData.append('lojaId', idLoja);
    formData.append('nome', document.getElementById('nome').value);
    formData.append('descricao', document.getElementById('descricao').value);
    formData.append('preco', document.getElementById('preco').value);
    formData.append('ativo', document.getElementById('ativo').checked);
    formData.append('dataCriacao', new Date().toISOString());
    
    // IMPORTANTE: Adicionais precisam ser enviados como String para o n8n entender o array
    formData.append('adicionais', JSON.stringify(selecionados));
    
    if (action === "update") {
        formData.append('comboId', document.getElementById('comboIdField').value);
    }

    showMsg("Salvando...");
    try {
        await fetch(WEBHOOK_COMBOS, {
            method: 'POST',
            // Ao usar FormData, o navegador define o Header 'multipart/form-data' automaticamente
            body: formData
        });
        showMsg("Combo salvo!", "#dcfce7");
		window.scrollTo({
		  top: 0,
		  behavior: 'smooth'
		});
        resetForm();
        carregarCombos();
    } catch (err) { 
        console.error(err);
        showMsg("Erro ao salvar.", "#fee2e2"); 
    }
});

    async function deletarCombo(id) {
        if(!confirm("Excluir combo?")) return;
        try {
            await fetch(WEBHOOK_COMBOS, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action: "delete", comboId: id })
            });
            carregarCombos();
        } catch (e) { alert("Erro ao deletar."); }
    }

    function prepararEdicao(combo) {
        resetForm();
        document.getElementById('actionField').value = "update";
        document.getElementById('comboIdField').value = combo.comboId;
        document.getElementById('nome').value = combo.nome;
        document.getElementById('descricao').value = combo.descricao;
        document.getElementById('preco').value = combo.preco || "";
        document.getElementById('ativo').checked = combo.ativo;
        
        if(combo.adicionais) {
            combo.adicionais.forEach(add => {
                const cb = document.querySelector(`input[value="${add.adicionalId}"]`);
                if(cb) cb.checked = true;
            });
        }
        document.getElementById('btnSubmit').textContent = "ATUALIZAR COMBO";
        document.getElementById('btnCancel').style.display = "block";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function resetForm() {
        document.getElementById('comboForm').reset();
        document.getElementById('actionField').value = "create";
        document.getElementById('btnSubmit').textContent = "SALVAR COMBO";
        document.getElementById('btnCancel').style.display = "none";
    }

    function showMsg(txt, color = "#dbeafe") {
        const m = document.getElementById('msgStatus');
        m.style.display = 'block'; m.textContent = txt; m.style.background = color;
        setTimeout(() => m.style.display = 'none', 3000);
    }
</script>
</body>
</html>
