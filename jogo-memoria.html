<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game - BotHolly</title>
    <style>
        :root {
            --primary: #ffd700;
            --bg: #121212;
            --card-bg: #1e1e1e;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            gap: 20px;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        #tentativas { color: #ff4757; font-weight: bold; }

        /* Grid de Cartas Responsivo */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 colunas no mobile */
            gap: 10px;
            max-width: 600px;
            width: 100%;
        }

        /* Para telas maiores (PC), usamos 6 colunas */
        @media (min-width: 480px) {
            .grid { grid-template-columns: repeat(6, 1fr); }
        }

        .card {
            aspect-ratio: 1 / 1;
            background-color: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s;
            border: 2px solid #333;
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            border-radius: 6px;
        }

        .card-back {
            background-color: var(--primary);
            color: #000;
            font-weight: bold;
        }

        .card-front {
            background-color: #fff;
            transform: rotateY(180deg);
        }

        .card.matched {
            visibility: hidden; /* Esconde o par achado */
            transition: 0.5s;
        }

        #btn-reset {
            margin-top: 20px;
            padding: 10px 25px;
            background: var(--primary);
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            display: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Jogo da Memória</h1>
        <div class="stats">
            <div>Erros: <span id="erros">0</span>/3</div>
            <div>Pares: <span id="pares">0</span>/12</div>
        </div>
    </div>

    <div class="grid" id="grid"></div>

    <button id="btn-reset" onclick="location.reload()">TENTAR NOVAMENTE</button>

    <script>
        const emojis = ['🍕','🍔','🍟','🌭','🍦','🍩','🍎','🍓','🥑','🍣','🍱','🌮'];
        let cards = [...emojis, ...emojis]; // 24 figuras (12 pares)
        let flippedCards = [];
        let matchedPairs = 0;
        let errors = 0;
        let lockBoard = false;

        const grid = document.getElementById('grid');
        const errosDisplay = document.getElementById('erros');
        const paresDisplay = document.getElementById('pares');

        // 1. Embaralhar
        cards.sort(() => Math.random() - 0.5);


        // 2. Criar Cartas e Mostrar por 3 segundos
		function createBoard() {
			cards.forEach((emoji, index) => {
				const card = document.createElement('div');
				card.classList.add('card', 'flipped'); // Começa já virada (flipped)
				card.dataset.emoji = emoji;
				card.innerHTML = `
					<div class="card-front">${emoji}</div>
					<div class="card-back">?</div>
				`;
				// Removemos o evento de clique por enquanto para o usuário não clicar antes da hora
				grid.appendChild(card);
			});

			// --- Lógica do Cronômetro de Visualização ---
			lockBoard = true; // Bloqueia cliques durante o preview
			
			setTimeout(() => {
				const allCards = document.querySelectorAll('.card');
				allCards.forEach(card => {
					card.classList.remove('flipped'); // Esconde as cartas
					card.addEventListener('click', flipCard); // Ativa os cliques agora
				});
				lockBoard = false; // Libera o jogo
				 
			}, 3000); // 3000 milissegundos = 3 segundos
		}

        // 3. Virar Carta
        function flipCard() {
            if (lockBoard || this.classList.contains('flipped')) return;

            this.classList.add('flipped');
            flippedCards.push(this);

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        // 4. Checar Par
        function checkMatch() {
            lockBoard = true;
            const [card1, card2] = flippedCards;

            if (card1.dataset.emoji === card2.dataset.emoji) {
                // ACERTOU
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    matchedPairs++;
                    paresDisplay.textContent = matchedPairs;
                    resetTurn();
                    if (matchedPairs === 12) win();
                }, 600);
            } else {
                // ERROU
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    errors++;
                    errosDisplay.textContent = errors;
                    resetTurn();
                    if (errors >= 3) gameOver();
                }, 1000);
            }
        }

        function resetTurn() {
            flippedCards = [];
            lockBoard = false;
        }

        function gameOver() {
            alert("VOCÊ PERDEU! Atingiu o limite de 3 erros.");
            document.getElementById('btn-reset').style.display = 'block';
            lockBoard = true;
        }

        function win() {
            alert("PARABÉNS! Você achou todos os pares e ganhou o prêmio!");
        }

        createBoard();
    </script>
</body>
</html>
