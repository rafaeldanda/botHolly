<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-commerce - Me Leva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        #cart-sidebar-container {
            position: fixed;
            inset: 0;
            z-index: 100;
            visibility: hidden;
            transition: visibility 0.3s;
        }
        #cart-sidebar-container.cart-open { visibility: visible; }
        
        #cart-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.3s;
        }
        #cart-sidebar-container.cart-open #cart-overlay { opacity: 1; }

        #cart-sidebar {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 100%;
            max-width: 400px;
            background: white;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #cart-sidebar-container.cart-open #cart-sidebar { transform: translateX(0); }

        #cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            scrollbar-width: thin;
        }

        #cart-footer {
            padding: 20px;
            background: #fff;
            border-top: 1px solid #eee;
            overflow-y: auto;
            max-height: 65vh;
        }

        .input-checkout {
            width: 100%;
            padding: 12px;
            background: #f3f4f6;
            border-radius: 12px;
            border: 2px solid transparent;
            font-weight: bold;
            font-size: 14px;
            outline: none;
            margin-bottom: 10px;
        }
        .input-checkout:focus { border-color: #fbbf24; }

        .obs-vermelha {
            color: #ef4444;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            font-size: 10px;
            margin-top: 4px;
        }
		
		footer {
        background-color: #ffffff; /* Fundo Branco */
        color: #333333;           /* Texto Grafite Escuro para melhor leitura */
        padding: 30px 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        text-align: center;
        font-size: 14px;
        border-top: 1px solid #e0e0e0; /* Linha sutil para separar do conteúdo */
    }

    .footer-content {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .footer-info span {
        margin: 0 15px;
        display: inline-block;
        color: #555555; /* Cor levemente mais suave para os detalhes */
    }

    .footer-info strong {
        color: #000000; /* Negrito em preto total para destaque */
    }

    .copyright {
        margin-top: 20px;
        font-size: 12px;
        color: #888888;
    }

    /* Ajuste para links (caso você adicione algum) */
    footer a {
        color: #007bff;
        text-decoration: none;
    }

    footer a:hover {
        text-decoration: underline;
    }

    @media (max-width: 600px) {
        .footer-info span {
            display: block;
            margin: 8px 0;
        }
    }
	
	
		/* A camada que cobre a tela toda */
	.modal-overlay {
		position: fixed;
		top: 0;
		left: 0;
		width: 100%;
		height: 100%;
		background: rgba(0, 0, 0, 0.6); /* Fundo escurecido */
		display: none;
		justify-content: center; /* Centraliza horizontalmente */
		align-items: center;     /* Centraliza verticalmente */
		z-index: 1000;           /* Garante que fique acima de tudo */
	}

	/* O Card em si */
	.card {
		background: white;
		padding: 24px;
		border-radius: 12px;
		box-shadow: 0 10px 25px rgba(0,0,0,0.2);
		width: 90%;
		max-width: 400px;
		animation: surgir 0.3s ease-out;
	}

	.card-actions {
		display: flex;
		justify-content: center; /* Mudou de flex-end para center */
		gap: 10px;
		margin-top: 20px;
		width: 100%; /* Garante que o container ocupe a largura total do card */
	}

	/* Animação para o card não aparecer de soco */
	@keyframes surgir {
		from { opacity: 0; transform: translateY(-20px); }
		to { opacity: 1; transform: translateY(0); }
	}
		
		/* Garante que o conteúdo do card apareça */
.card-content {
    display: block;
    width: 100%;
    min-height: 200px; /* Dá um espaço para o vídeo não sumir */
    margin-top: 15px;
}

.video-responsivo {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    overflow: hidden;
}

.video-responsivo iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}
		
		
		.container-site {
			display: flex;
			justify-content: center; /* Alinha horizontalmente */
			align-items: center;     /* Alinha verticalmente (se o container tiver altura) */
			width: 100%;             /* Garante que o container ocupe a largura toda */
			margin: 20px 0;         /* Espaçamento em cima e embaixo */
		}
		
		
    </style>
</head>
<body class="bg-gray-50 pb-24 text-gray-900">

    <header class="bg-white/90 backdrop-blur-lg sticky top-0 z-40 border-b border-gray-100">
        <div class="container mx-auto px-4">
            <div class="h-16 flex justify-between items-center">
                <h1 id="nome-loja" class="font-black italic text-lg tracking-tighter uppercase text-gray-800">CARREGANDO...</h1>
                <button onclick="toggleCart()" class="bg-black text-white px-5 py-2 rounded-full font-bold text-xs shadow-lg flex items-center gap-2 active:scale-95 transition-all">
                    PEDIDO <span id="cart-count" class="bg-yellow-400 text-black px-2 py-0.5 rounded-full text-[10px]">0</span>
                </button>
            </div>
            <div id="category-nav" class="flex gap-2 overflow-x-auto pb-3 no-scrollbar hidden"></div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6">
        <div id="combos-section" class="hidden mb-12">
            <h3 class="font-black text-xl text-gray-900 border-l-4 border-orange-500 pl-3 uppercase italic mb-4">Combos Especiais</h3>
            <div id="combos-content" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
        <div id="menu-content" class="space-y-12">
            <div id="loading-skeleton" class="animate-pulse space-y-4">
                <div class="h-8 bg-gray-200 w-1/3 rounded"></div>
                <div class="h-28 bg-gray-200 rounded-[2rem]"></div>
            </div>
        </div>
    </main>

    <div id="cart-sidebar-container">
        <div id="cart-overlay" onclick="toggleCart()"></div>
        <div id="cart-sidebar">
            <div class="p-5 border-b flex justify-between items-center bg-gray-900 text-white">
                <h3 class="font-black italic text-lg text-yellow-400 uppercase">Meu Pedido</h3>
                <button onclick="toggleCart()" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-800 text-white">✕</button>
            </div>
            <div id="cart-items" class="no-scrollbar"></div>
            <div id="cart-footer"></div>
        </div>
    </div>
	
	<div id="modal-container" class="modal-overlay"> 
		<div class="card">
			<h3>Finalizar Pedido</h3></br>
			<small>Fique atento ao celular ou a chegada do entregador.</small>			
			<div class="card-content">
			
				
				
			</div>
			<div class="card-actions">
				<button class="btn-secundario" onclick="fecharModal()">Confirmar</button>				
			</div>
		</div>
	</div>
  
  
  
  
  <script>
    // --- CONFIGURAÇÕES E ESTADO GLOBAL ---
    const API_BASE = "https://primary-production-fad5.up.railway.app/webhook";
    const ENDPOINTS = {
        loja: `${API_BASE}/55f8cc8e-b4d2-4869-a40c-0325e0948e79`,
        cardapio: `${API_BASE}/6f8beaac-e8b9-468e-b2b5-c6caf131877c`,
        combos: `${API_BASE}/6f070c83-fc80-43f4-898c-549dc109346d`,
        cupons: `${API_BASE}/b7fcc846-c71c-4777-8d28-def127121c5c`,
        config: `${API_BASE}/438079aa-505d-434b-b482-4c7226b72f25`,
        categorias: `${API_BASE}/ed3089cf-5e2f-4aa0-bc3f-3c1a827616fa`,
        enviarPedido: `${API_BASE}/dd15b276-b4f1-4bd8-8fb8-e40a9f037700`
    };

    const TOKEN_MAP_DELIVERY = 'pk.eyJ1IjoicmFmYWVsZGFuZGEiLCJhIjoiY21tM3V6aHQ3MDR1dTJxcHdiNnhpaHd0ayJ9.w-fjeHmzlyVes75Rg4pJuQ';

    let db = { loja: {}, produtos: [], combos: [], cupons: [], config: {}, categorias: [] };
    let carrinho = [];
    let entregaAtiva = true;
    let descontoAtivo = 0; // Armazena a porcentagem (ex: 10)
    let cupomAplicado = ""; 
    let mapaCategorias = {};
    let lojaOnline = false;
	let valorTeleCalculado = 0;
    const idLoja = new URLSearchParams(window.location.search).get('l');

    // --- UTILITÁRIOS ---
    async function fetchJSON(url, options = {}) {
        try {
            const res = await fetch(url, options);
            return res.ok ? await res.json() : null;
        } catch (e) { 
            console.error("Erro no fetch:", url, e);
            return null; 
        }
    }

    async function getCoords(enderecoTexto) {
        try {
            const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(enderecoTexto)}.json?access_token=${TOKEN_MAP_DELIVERY}&limit=1`;
            const response = await fetch(url);
            const data = await response.json();
            return data.features?.length > 0 ? data.features[0].center : null;
        } catch (e) { return null; }
    }

    // --- INICIALIZAÇÃO ---
    async function init() {
        if (!idLoja) return alert("ID da loja não encontrado.");
        
        const payload = { action: "read", lojaId: idLoja };
        const headers = { 'Content-Type': 'application/json' };

        try {
            const [dataLoja, dataProd, dataComb, dataCup, dataConf, dataCats] = await Promise.all([
                fetchJSON(`${ENDPOINTS.loja}?action=read&lojaId=${idLoja}`),
                fetchJSON(ENDPOINTS.cardapio, { method: 'POST', headers, body: JSON.stringify(payload) }),
                fetchJSON(ENDPOINTS.combos, { method: 'POST', headers, body: JSON.stringify(payload) }),
                fetchJSON(ENDPOINTS.cupons, { method: 'POST', headers, body: JSON.stringify(payload) }),
                fetchJSON(ENDPOINTS.config, { method: 'POST', headers, body: JSON.stringify(payload) }),
                fetchJSON(ENDPOINTS.categorias, { method: 'POST', headers, body: JSON.stringify(payload) })
            ]);

            if (Array.isArray(dataCats)) dataCats.forEach(c => mapaCategorias[c.categoriaId] = c.nome);

            db = {
                loja: dataLoja || { nome: "Anfitrião" },
                produtos: Array.isArray(dataProd) ? dataProd : [],
                combos: Array.isArray(dataComb) ? dataComb : (dataComb ? [dataComb] : []),
                config: dataConf || { valorTele: 0, valorMinimo: 0, online: false },
                cupons: Array.isArray(dataCup) ? dataCup : []
            };

            lojaOnline = db.config.online;
            renderInterface();
            footer();
        } catch (err) {
            console.error("Erro no Init:", err);
            renderInterface();
        }
    }

    // --- INTERFACE E TEMPLATES ---
    function renderInterface() {
        const skeleton = document.getElementById('loading-skeleton');
        if (skeleton) skeleton.classList.add('hidden');
        
        document.getElementById('nome-loja').textContent = db.loja.nome || "ME LEVA";

        const combosAtivos = db.combos.filter(c => String(c.ativo) === "true");
        const combosContent = document.getElementById('combos-content');
        if (combosAtivos.length > 0 && combosContent) {
            document.getElementById('combos-section').classList.remove('hidden');
            combosContent.innerHTML = combosAtivos.map(c => cardTemplate(c, true)).join('');
        }

        const menuContent = document.getElementById('menu-content');
        const nav = document.getElementById('category-nav');
        if (!menuContent || !nav) return;

        const categoriasMap = db.produtos.reduce((acc, p) => {
            if (String(p.ativo) === "false") return acc;
            const nomeCat = mapaCategorias[p.categoriaId] || "OUTROS";
            if (!acc[nomeCat]) acc[nomeCat] = [];
            acc[nomeCat].push(p);
            return acc;
        }, {});

        nav.innerHTML = ""; menuContent.innerHTML = "";
        Object.keys(categoriasMap).forEach(nome => {
            const idAncora = nome.replace(/\s+/g, '-').toLowerCase();
            nav.innerHTML += `<a href="#cat-${idAncora}" class="px-4 py-1.5 bg-gray-100 rounded-full text-[10px] font-black uppercase border border-transparent hover:border-yellow-400 transition-all">${nome}</a>`;
            menuContent.innerHTML += `
                <div id="cat-${idAncora}" class="scroll-mt-28 space-y-4">
                    <h3 class="font-black text-xl border-l-4 border-yellow-400 pl-3 uppercase italic">${nome}</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">${categoriasMap[nome].map(p => cardTemplate(p)).join('')}</div>
                </div>`;
        });
        nav.classList.remove('hidden');
    }

    function cardTemplate(item, isCombo = false) {
        const id = isCombo ? item.comboId : item.produtoId;
        const precoOriginal = parseFloat(item.preco || 0);
        let precoFinal = precoOriginal;
        let htmlPreco = '';

        if (item.promocao && parseFloat(item.desconto) > 0) {
            precoFinal = precoOriginal * (1 - (parseFloat(item.desconto) / 100));
            htmlPreco = `
                <div class="flex items-center gap-2 mt-2">
                    <p class="font-black text-lg italic text-gray-900">R$ ${precoFinal.toFixed(2)}</p>
                    <p class="text-xs text-gray-400 line-through">R$ ${precoOriginal.toFixed(2)}</p>
                </div>`;
        } else {
            htmlPreco = `<p class="font-black text-lg mt-2 italic text-gray-900">R$ ${precoOriginal.toFixed(2)}</p>`;
        }

        return `
            <div onclick="abrirModal('${id}', ${isCombo})" class="bg-white p-4 rounded-[2rem] flex gap-4 shadow-sm border border-gray-100 hover:border-yellow-400 cursor-pointer active:scale-95 transition-all">
                <div class="flex-1">
                    <h4 class="font-bold text-gray-900 uppercase text-sm">${item.nome}</h4>
                    <p class="text-[10px] text-gray-500 mt-1 line-clamp-2">${item.descricao || ''}</p>
                    ${htmlPreco}
                </div>
                <div class="w-20 h-20 bg-gray-50 rounded-2xl flex items-center justify-center text-2xl border overflow-hidden">
                    <img src="${item.url}" class="w-full h-full object-cover">
                </div>
            </div>`;
    }

    // --- CARRINHO E MODAL ---
    function abrirModal(id, isCombo) {
        const item = isCombo ? db.combos.find(c => c.comboId === id) : db.produtos.find(p => p.produtoId === id);
        if (!item) return;

        const modalHTML = `
            <div id="modal" class="fixed inset-0 z-[110] flex items-end md:items-center justify-center bg-black/50 backdrop-blur-sm">
                <div class="bg-white w-full md:max-w-xl rounded-t-[2.5rem] md:rounded-[2.5rem] flex flex-col max-h-[90vh]">
                    <div class="p-6 overflow-y-auto no-scrollbar">
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-black uppercase italic">${item.nome}</h2>
                            <button onclick="document.getElementById('modal').remove()" class="w-8 h-8 bg-gray-100 rounded-full font-bold">✕</button>
                        </div>
						<div>
							<img src="${item.url}" class="w-full h-full object-cover">
						</div>
                        <div class="space-y-3">
                            ${item.adicionais?.map(add => `
                                <label class="flex justify-between p-4 bg-gray-50 rounded-2xl border-2 border-transparent has-[:checked]:border-yellow-400 cursor-pointer">
                                    <div class="flex gap-3">
                                        <input type="checkbox" name="add" data-nome="${add.nome}" data-preco="${add.preco}" data-id="${add.adicionalId}" class="w-5 h-5 accent-black">
                                        <span class="font-bold text-sm">${add.nome}</span>
                                    </div>
                                    <span class="text-xs font-black text-green-600">+ R$ ${parseFloat(add.preco).toFixed(2)}</span>
                                </label>`).join('') || ''}
                        </div>
                        <textarea id="obs" placeholder="Alguma observação?" class="w-full p-4 bg-gray-100 rounded-2xl border-none mt-6 text-sm outline-none focus:ring-2 ring-yellow-400"></textarea>
                    </div>
                    <div class="p-6 border-t">
                        <button onclick="adicionarAoCarrinho('${id}', ${isCombo})" class="w-full bg-yellow-400 py-4 rounded-2xl font-black uppercase shadow-lg">ADICIONAR</button>
                    </div>
                </div>
            </div>`;
        document.body.insertAdjacentHTML('beforeend', modalHTML);
    }

    function adicionarAoCarrinho(id, isCombo) {
        const item = isCombo ? db.combos.find(c => c.comboId === id) : db.produtos.find(p => p.produtoId === id);
        const selectedAdds = []; 
        let extra = 0;
        
        document.querySelectorAll('input[name="add"]:checked').forEach(el => {
            selectedAdds.push({ nome: el.dataset.nome, preco: parseFloat(el.dataset.preco), adicionalId: el.dataset.id });
            extra += parseFloat(el.dataset.preco);
        });

        carrinho.push({ 
            ...item, 
            adicionaisSelecionados: selectedAdds, 
            obsCliente: document.getElementById('obs').value, 
            tipo: isCombo ? 'combo' : 'produto' 
        });

        document.getElementById('modal').remove();
        atualizarCarrinhoUI();
        toggleCart();
    }

    function removerItem(i) { carrinho.splice(i, 1); atualizarCarrinhoUI(); }
    function toggleCart() { document.getElementById('cart-sidebar-container').classList.toggle('cart-open'); }
    function setEntrega(s) { entregaAtiva = s; atualizarCarrinhoUI(); }

    function atualizarCarrinhoUI() {
        const itemsCont = document.getElementById('cart-items');
        const footerCont = document.getElementById('cart-footer');
        
        const nomeAtual = document.getElementById('cli-nome')?.value || "";
        const telAtual = document.getElementById('cli-tel')?.value || "";
        const ruaAtual = document.getElementById('cli-end')?.value || "";
        const numAtual = document.getElementById('cli-num')?.value || "";
        const compAtual = document.getElementById('cli-comp')?.value || "";
        const pagtoAtual = document.getElementById('forma-pagamento')?.value || "pix";
        const cupomTexto = document.getElementById('input-cupom')?.value || "";

        if (carrinho.length === 0) {
            itemsCont.innerHTML = `<div class="h-full flex flex-col items-center justify-center opacity-30 italic font-black py-20 uppercase">Carrinho Vazio</div>`;
            footerCont.innerHTML = "";
            return;
        }

        // Cálculo do Subtotal considerando promoções por item
        const subtotal = carrinho.reduce((acc, i) => {
            const fator = i.promocao ? (1 - (parseFloat(i.desconto || 0) / 100)) : 1;
            const precoItem = (parseFloat(i.preco || 0) * fator) + (i.adicionaisSelecionados?.reduce((s, a) => s + parseFloat(a.preco), 0) || 0);
            return acc + precoItem;
        }, 0);

        itemsCont.innerHTML = carrinho.map((item, idx) => {
            const adsVal = item.adicionaisSelecionados?.reduce((s, a) => s + parseFloat(a.preco), 0) || 0;
            const fator = item.promocao ? (1 - (parseFloat(item.desconto || 0) / 100)) : 1;
            const final = (parseFloat(item.preco) * fator) + adsVal;
            return `
                <div class="bg-gray-50 p-4 rounded-2xl relative border mb-3">
                    <button onclick="removerItem(${idx})" class="absolute top-4 right-4 text-red-500 font-bold text-[10px] uppercase">Remover</button>
                    <p class="font-bold text-xs uppercase">${item.nome}</p>
                    <div class="mt-1">${item.adicionaisSelecionados?.map(a => `<span class="block text-[10px] text-gray-400 font-black uppercase">${a.nome}</span>`).join('') || ''}</div>
                    ${item.obsCliente ? `<p class="text-[10px] text-red-600 font-bold italic mt-2">"${item.obsCliente}"</p>` : ''}
                    <p class="font-black mt-2 text-base">R$ ${final.toFixed(2)}</p>
                </div>`;
        }).join('');

        const tele = entregaAtiva ? parseFloat(valorTeleCalculado || 0) : 0;
        const valorCupom = subtotal * (descontoAtivo / 100);
        const total = (subtotal + tele) - valorCupom;

        footerCont.innerHTML = `
            <div class="space-y-4">
                <div class="bg-gray-50 p-3 rounded-2xl border border-dashed border-gray-300">
                    <p class="text-[9px] font-black uppercase text-gray-400 mb-2">Cupom de Desconto</p>
                    <div class="flex gap-2">
                        <input type="text" id="input-cupom" value="${cupomAplicado || cupomTexto}" placeholder="CÓDIGO" class="flex-1 bg-white p-2 rounded-lg text-xs font-bold uppercase outline-none ring-1 ring-gray-200">
                        <button onclick="aplicarCupom()" class="bg-black text-white px-4 py-2 rounded-lg text-[10px] font-bold uppercase">Aplicar</button>
                    </div>
                </div>
                <input type="text" id="cli-nome" value="${nomeAtual}" placeholder="Seu Nome" class="input-checkout">
                <input type="tel" id="cli-tel" value="${telAtual}" placeholder="Seu WhatsApp" class="input-checkout">
                <div class="flex gap-2">
                    <button onclick="setEntrega(true)" class="flex-1 py-3 rounded-xl font-bold text-[10px] border-2 ${entregaAtiva ? 'border-yellow-400 bg-yellow-400' : 'border-gray-100'}">ENTREGA</button>
                    <button onclick="setEntrega(false)" class="flex-1 py-3 rounded-xl font-bold text-[10px] border-2 ${!entregaAtiva ? 'border-yellow-400 bg-yellow-400' : 'border-gray-100'}" ${!db.config.retiradaLocal ? 'disabled' : ''}>RETIRADA</button>
                </div>
                <div id="endereco-campos" class="${entregaAtiva ? '' : 'hidden'} space-y-2">
                    <input type="text" id="cli-end" value="${ruaAtual}" placeholder="Rua / Bairro" class="input-checkout">
                    <input type="text" id="cli-num" value="${numAtual}" placeholder="Número" class="input-checkout" onblur="calcularValorTeleDinamico()">
                    <input type="text" id="cli-comp" value="${compAtual}" placeholder="Complemento" class="input-checkout">
                </div>
                <select id="forma-pagamento" class="input-checkout">
                    <option value="pix" ${pagtoAtual === 'pix' ? 'selected' : ''}>PIX</option>
                    <option value="cartao" ${pagtoAtual === 'cartao' ? 'selected' : ''}>CARTÃO</option>
                </select>
                <div class="pt-4 border-t text-xs font-bold uppercase italic space-y-1">
                    <div class="flex justify-between text-gray-400"><span>Subtotal</span><span>R$ ${subtotal.toFixed(2)}</span></div>

	async function calcularValorTeleDinamico() {
    const rua = document.getElementById('cli-end')?.value;
    const num = document.getElementById('cli-num')?.value;
    
    // 1. Verificações de segurança
    if (!rua || !num || !db.loja.endereco) return;

    // 2. Definição dos endereços (faltava isso no seu código)
    const endLoja = typeof db.loja.endereco === 'object' 
        ? `${db.loja.endereco.rua}, ${db.loja.endereco.numero}` 
        : db.loja.endereco;
    const endCli = `${rua}, ${num}, ${db.loja.cidade || 'Porto Alegre'}`;

    try {
        // 3. Obtém coordenadas
        const cLoja = await getCoords(endLoja);
        const cCli = await getCoords(endCli, cLoja); // Usa a loja como proximidade

        if (cLoja && cCli) {
            const res = await fetch(`https://api.mapbox.com/directions/v5/mapbox/driving/${cLoja[0]},${cLoja[1]};${cCli[0]},${cCli[1]}?access_token=${TOKEN_MAP_DELIVERY}`);
            const data = await res.json();

            if (data.routes?.length > 0) {
			    const km = data.routes[0].distance / 1000;
			
			    // --- PROTEÇÃO CONTRA SOBREPOSIÇÃO ---
			    // Tentamos ler uma chave exclusiva para o PREÇO (valorTelePorKm).
			    // Se ela não existir (undefined), usamos o valor fixo 2.5.
			    // NUNCA usamos db.config.valorTele para ler o multiplicador, pois ele é sobrescrito.
			    const precoPorKm = parseFloat(db.config.valorTele || 2.5);
			    const valorMinimo = parseFloat(db.config.valorMinimo || 5.0);
			
			    // Cálculo Final
			    const resultadoFrete = Math.max(km * precoPorKm, valorMinimo);
				
				if(resultadoFrete >= 20){
					alert("Identificamos que o valor da tele-entrega ficou acima do normal.\nVerifica se o edereço esta com 'rua/av' junto ao endereço.\n\nerrado: 'albion'\ncerto: 'rua albion'  ");
				}
				
			    // Aqui salvamos o resultado para a UI e para o envio do pedido
			    valorTeleCalculado = resultadoFrete;
			
			    // Log para você conferir no console (F12) que o precoPorKm não mudou
			    console.log(`Cálculo: ${km.toFixed(2)}km x R$ ${precoPorKm.toFixed(2)} (Min: R$ ${valorMinimo.toFixed(2)})`);
			    console.log(`Resultado salvo em valorTele: R$ ${db.config.valorTele.toFixed(2)}`);
			    
			    atualizarCarrinhoUI();
			}
        }
    } catch (error) {
        console.error("Erro no cálculo de frete:", error);
    }
}




	  

	// Ajuste a sua função getCoords para aceitar a proximidade
	async function getCoords(endereco, proximidade = null) {
		let url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(endereco)}.json?access_token=${TOKEN_MAP_DELIVERY}&limit=1&country=br`;
		
		// Se passarmos a coordenada da loja, a busca fica muito mais precisa
		if (proximidade) {
			url += `&proximity=${proximidade[0]},${proximidade[1]}`;
		}

		try {
			const res = await fetch(url);
			const data = await res.json();
			return data.features?.[0]?.center || null; // Retorna [long, lat]
		} catch (e) {
			return null;
		}
	}
	
	
	
	
	
	
	
	
	
	

    async function finalizarPedido() {
        const nome = document.getElementById('cli-nome')?.value;
        const tel = document.getElementById('cli-tel')?.value;
        if (!nome || !tel || carrinho.length === 0) return alert("Preencha todos os dados!");

        const btn = document.getElementById('btn-finalizar');
        btn.disabled = true; btn.textContent = "ENVIANDO...";

        // Recalcula tudo para o Payload
        const subtotal = carrinho.reduce((acc, i) => {
            const fator = i.promocao ? (1 - (parseFloat(i.desconto || 0) / 100)) : 1;
            return acc + (parseFloat(i.preco) * fator) + (i.adicionaisSelecionados?.reduce((s, a) => s + parseFloat(a.preco), 0) || 0);
        }, 0);
        
        const taxa = entregaAtiva ? parseFloat(db.config.valorTele || 0) : 0;
        const descCupom = subtotal * (descontoAtivo / 100);

        const payload = {
            action: "create",
            cupom: cupomAplicado,
            loja: { ...db.loja, valorTele: taxa },
            itens: carrinho.map(i => ({
                nome: i.nome,
                valorFinal: (parseFloat(i.preco) * (i.promocao ? 1-(i.desconto/100) : 1)) + (i.adicionaisSelecionados?.reduce((s,a)=>s+parseFloat(a.preco),0)||0),
                adicionais: i.adicionaisSelecionados,
                obs: i.obsCliente
            })),
            cliente: { 
                nome, telefone: tel, 
                endereco: entregaAtiva ? `${document.getElementById('cli-end').value}, ${document.getElementById('cli-num').value}, ${document.getElementById('cli-comp').value}` : "RETIRADA" 
            },
            totalPedido: (subtotal + taxa) - descCupom,
			status:'solicitada',
            formaPagamento: document.getElementById('forma-pagamento').value
        };

        try {
            const res = await fetch(ENDPOINTS.enviarPedido, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify(payload) 
            });			
            if (res.ok) mostrarModal(db.config.linkCarrinho || "");
        } catch (e) { alert("Erro ao enviar pedido."); } 
        finally { btn.disabled = false; btn.textContent = "Confirmar Pedido"; }
    }
