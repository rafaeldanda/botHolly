<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raspadinha Premiada</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
        }

        .container {
            position: relative;
            width: 300px;
            height: 300px;
            user-select: none;
            border: 5px solid #ffd700;
            border-radius: 15px;
            overflow: hidden;
            background-color: #fff;
        }

        /* O Prêmio que fica embaixo */
        .premio {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #333;
        }

        .premio h2 { margin: 0; color: #e74c3c; }
        .premio p { font-size: 24px; font-weight: bold; margin: 10px 0; }

        /* O Canvas que fica em cima */
        #raspadinha {
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
            touch-action: none; /* Impede o scroll no celular ao raspar */
        }

        .instrucao {
            margin-top: 20px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <h1>Tente a Sorte!</h1>
    
    <div class="container">
        <div class="premio">
            <h2>GANHOU!</h2>
            <p>10% OFF</p>
            <span>CÓDIGO: HOLLY10</span>
        </div>

        <canvas id="raspadinha" width="300" height="300"></canvas>
    </div>

    <p class="instrucao">Passe o mouse ou o dedo para raspar</p>

    <script>
        const canvas = document.getElementById('raspadinha');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        // 1. Inicializa o Canvas com a cor de "tinta"
        function init() {
            ctx.fillStyle = '#C0C0C0'; // Prata
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Adiciona umas manchinhas para parecer raspadinha real
            ctx.fillStyle = '#a0a0a0';
            for(let i=0; i<500; i++) {
                ctx.fillRect(Math.random()*300, Math.random()*300, 2, 2);
            }
        }

        // 2. Função para apagar (raspar)
        function scratch(e) {
            if (!isDrawing) return;

            // Pega a posição correta dentro do canvas
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            ctx.globalCompositeOperation = 'destination-out'; // O segredo: vira borracha
            ctx.beginPath();
            ctx.arc(x, y, 25, 0, Math.PI * 2); // Tamanho da "moeda"
            ctx.fill();
        }

        // Eventos de Mouse
        canvas.addEventListener('mousedown', () => isDrawing = true);
        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mousemove', scratch);

        // Eventos de Toque (Celular)
        canvas.addEventListener('touchstart', (e) => { isDrawing = true; scratch(e); });
        canvas.addEventListener('touchend', () => isDrawing = false);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); });

        init();
    </script>
</body>
</html>
