<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD de Produtos - Oficial</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --bg: #f1f5f9;
            --card: #ffffff;
            --border: #cbd5e1;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); padding: 20px; line-height: 1.5; }
        .container { max-width: 900px; margin: 0 auto; background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        h1, h2 { margin-bottom: 20px; color: #1e293b; font-size: 1.5rem; border-left: 4px solid var(--primary); padding-left: 10px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-weight: 600; font-size: 14px; color: #475569; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: #fff; }
        textarea { min-height: 80px; resize: vertical; }
        .options-group { display: flex; gap: 20px; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }
        .checkbox-label input { width: auto; }
        .section-header { margin-top: 25px; padding: 10px; background: #e2e8f0; border-radius: 6px; font-weight: bold; font-size: 14px; }
        .adicionais-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; padding: 15px; border: 2px dashed #e2e8f0; border-radius: 8px; margin-bottom: 20px; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: opacity 0.2s; padding: 10px; color: white; }
        .btn-main { width: 100%; padding: 16px; background: var(--success); font-size: 16px; margin-top: 10px; }
        .btn-delete { background: var(--danger); font-size: 12px; }
        .table-container { width: 100%; overflow-x: auto; margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; color: #64748b; font-size: 12px; text-transform: uppercase; }
        #msgStatus { padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>Configurar Produto</h1>
    <div id="msgStatus"></div>

    <form id="productForm">
        <input type="hidden" id="actionField" value="create">
        
        <div class="form-grid">
            <div class="form-group">
                <label>Nome do Item</label>
                <input type="text" id="nome" placeholder="Ex: Xis Salada Completo" required>
            </div>
            <div class="form-group">
                <label>Categoria</label>
                <select id="categoriaId" required>
                    <option value="">Carregando categorias...</option>
                </select>
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label>Descrição Detalhada</label>
            <textarea id="descricao" placeholder="Ex: pão, Milho, Ervilha....." required></textarea>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label>Preço de Venda (R$)</label>
                <input type="number" id="preco" step="0.01" placeholder="Ex: 0,00" required>
            </div>
            <div class="form-group">
                <label>Desconto (%)</label>
                <input type="number" id="desconto" value="0">
            </div>
        </div>

        <div class="options-group">
            <label class="checkbox-label"><input type="checkbox" id="ativo" checked> Item Ativo</label>
            <label class="checkbox-label"><input type="checkbox" id="promocao"> Em Promoção</label>
        </div>

        <div class="section-header">Selecione os Adicionais Permitidos</div>
        <div id="adicionaisContainer" class="adicionais-grid"></div>

        <button type="submit" class="btn-main">ENVIAR PRODUTO</button>
    </form>

    <div class="table-container">
        <h2>Produtos no Sistema</h2>
        <table>
            <thead>
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Descrição</th>
        <th>Preço</th>
        <th>Ações</th>
    </tr>
</thead>
            <tbody id="listaProdutos"></tbody>
        </table>
    </div>
</div>

<script>
    const WEBHOOK_CATS = 'https://primary-production-fad5.up.railway.app/webhook/ed3089cf-5e2f-4aa0-bc3f-3c1a827616fa';
    const WEBHOOK_ADDS = 'https://primary-production-fad5.up.railway.app/webhook/b392fae3-1dff-4817-9bae-7b8cb9c52929';
    const WEBHOOK_PRODUTO = 'https://primary-production-fad5.up.railway.app/webhook/6f8beaac-e8b9-468e-b2b5-c6caf131877c'; 

    const urlParams = new URLSearchParams(window.location.search);
    const idLoja = urlParams.get('l');

    let dbAdicionais = [];

    window.onload = () => { init(); };

    async function init() {
        try {
            const resCat = await fetch(WEBHOOK_CATS, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action: "read", lojista_id: idLoja })
            });
            const cats = await resCat.json();
            const sel = document.getElementById('categoriaId');
            sel.innerHTML = '<option value="">Selecione...</option>';
            cats.forEach(c => sel.innerHTML += `<option value="${c.categoriaId}">${c.nome}</option>`);

            const resAdd = await fetch(WEBHOOK_ADDS, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action: "read", lojista_id: idLoja })
            });
            dbAdicionais = await resAdd.json();
            const addCont = document.getElementById('adicionaisContainer');
            dbAdicionais.forEach(a => {
                addCont.innerHTML += `
                    <label class="checkbox-label">
                        <input type="checkbox" name="chkAdd" value="${a.adicionalId}">
                        ${a.nome}
                    </label>
                `;
            });

            carregarProdutos();
        } catch (e) { console.error(e); }
    }

   
   
   
   async function carregarProdutos() {
    const tbody = document.getElementById('listaProdutos');
    try {
        const res = await fetch(WEBHOOK_PRODUTO, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ action: "read", lojaId: idLoja })
        });
        const produtos = await res.json();
        tbody.innerHTML = "";

        produtos.forEach(p => {
            // Usa o produtoId (PROD-XXXX) que confirmamos no seu Network tab
            const idParaDeletar = p.produtoId || p._id;

            tbody.innerHTML += `
                <tr>
                    <td><small style="color: #64748b; font-size: 11px;">${idParaDeletar}</small></td>
                    <td><strong>${p.nome}</strong></td>
                    <td><small>${p.descricao || '-'}</small></td>
                    <td>R$ ${p.preco ? parseFloat(p.preco).toFixed(2) : '0.00'}</td>
                    <td>
                        <button onclick="deletarProduto('${idParaDeletar}')" class="btn-delete">Excluir</button>
                    </td>
                </tr>
            `;
        });
    } catch (err) { 
        console.error("Erro ao carregar lista:", err);
        tbody.innerHTML = "<tr><td colspan='5'>Erro ao carregar lista.</td></tr>"; 
    }
}
   
   
   

    document.getElementById('productForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const selecionados = Array.from(document.querySelectorAll('input[name="chkAdd"]:checked'))
            .map(cb => {
                const info = dbAdicionais.find(item => item.adicionalId === cb.value);
                return { 
                    nome: info.nome,
                    preco: info.preco,
                    descricao: info.descricao,
                    adicionalId: info.adicionalId 
                };
            });

        const payload = {
            action: "create",
            lojaId: idLoja,
            categoriaId: document.getElementById('categoriaId').value,
            nome: document.getElementById('nome').value,
            descricao: document.getElementById('descricao').value,
            preco: parseFloat(document.getElementById('preco').value),
            ativo: document.getElementById('ativo').checked,
            promocao: document.getElementById('promocao').checked,
            desconto: parseFloat(document.getElementById('desconto').value),
            dataCadastro: new Date().toISOString(),
            adicionais: selecionados
        };

        const status = document.getElementById('msgStatus');
        status.style.display = 'block';
        status.textContent = 'Enviando...';
        status.style.background = '#dbeafe';

        try {
            const res = await fetch(WEBHOOK_PRODUTO, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            status.textContent = "Cadastrado!";
            status.style.background = '#dcfce7';
            
            document.getElementById('productForm').reset();
            carregarProdutos();
        } catch (err) {
            status.textContent = "Erro ao enviar.";
            status.style.background = '#fee2e2';
        }
    });

    async function deletarProduto(idCustom) {
        if(!confirm("Deseja realmente excluir este item?")) return;
        try {
            await fetch(WEBHOOK_PRODUTO, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    action: "delete", 
                    produtoId: idCustom 
                })
            });
            carregarProdutos();
        } catch (err) { alert("Erro ao deletar."); }
    }
</script>
</body>
</html>
